<!DOCTYPE html>
<html lang="pt-br">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
<meta charset="UTF-8">
<title>💌 Um convite</title>
<div id="notificaçao" class="notificaçao">
  <div class="notificaçao-configuraçao">
<p>abre rapidinho 😅</p>
<button onclick="fecharNotificacao()">abrir</button>
  </div>
</div>
<style>

#notificaçao {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;

}
.notificaçao-configuraçao {
  
  background: rgb(0, 0, 0);
  padding: 100%;
  border-radius: 10px;
  text-align: center;
}

.notificaçao-configuraçao button {
  margin: 21px;
  padding: 10px 10px;
border: none;
border-radius: 15px;
color: tomato;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  font-family: Arial, sans-serif;
  color: #f8fafc;
}

.container {
  width: 400px;
  background: rgba(30, 41, 59, 0.9);
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.poema {
  font-size: 17px;
  line-height: 1.6;
  margin-bottom: 25px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.sim {
  background: #22c55e;
  color: white;
}

.nao {
  background: #ef4444;
  color: white;
  transition: 0.3s;
}

/* EFEITO TRISTE 💔 */
.nao:hover {
  transform: scale(0.8);
  opacity: 0.6;
  filter: grayscale(80%);
}

button:hover {
  transform: scale(1.05);
}

footer {

  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: #94a3b8;
  font-size: 20px;
  }
footer a {
  color: #0a69ee;
  text-decoration: none;
}


.emoji {
    position: fixed;
    top: 0; /* começa no topo visível */
    left: 0;
    font-size: 30px;
    pointer-events: none; /* não bloqueia clique */
    z-index: 9999; /* fica na frente de tudo */
    animation: cair 3s linear forwards;
}

@keyframes cair {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh); /* garante que sai da tela */
        opacity: 0;
    }
}
h1
{
  font-size: 20px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>💌</h2>

  <div class="poema">
   
   Agora fiquei curioso se você teria coragem de me chamar.
  </div>

  <p>ou vai finjir Não viu</p>
  <button class="sim" onclick="aceitou()">Sim 😍</button>
  <button class="nao" onclick="recusou()">Não 😢</button>
  </form>
</div>

<script>
 






  function aceitou() {
    alert("Bom… você clicou\n e acho que meu insta tava aqui...");
    sim();
  }
  function recusou() {
    alert("Então pelo menos você já conheceu meu trabalho");
    nao();
  }
function criarEmoji(lista) {
    const emoji = document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerText = lista[Math.floor(Math.random() * lista.length)];

    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.fontSize = (20 + Math.random() * 30) + "px";

    document.body.appendChild(emoji);

    setTimeout(() => {
        emoji.remove();
    }, 3000);
}

function chuva(lista) {
    let i = 0;
    let intervalo = setInterval(() => {
        criarEmoji(lista);
        i++;
        if (i > 60) clearInterval(intervalo);
    }, 40);
}

function sim() {
    chuva(["😒","😅","🫥","😘","🧐","🎉"]);
}

function nao() {
    chuva(["😢","💔","😭","😞","🥀"]);
}

function fecharNotificacao() {
  document.getElementById("notificaçao").style.display = "none";
}

window.onload = function() {
  setTimeout(() => {
    document.getElementById("notificaçao").style.display = "flex";
  }, 89000);
};
</script>

<footer>

</footer>
